<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>背景とちょうちょの再現</title>
</head>
<body>

<div style="position: relative; width: 1000px; height: 562px;">
  <!-- 背景画像 -->
  <img src="bg0.png" style="position: absolute; left: 0; top: 0; width: 1000px; height: 562px;">

  <!-- 左上のテキストエリア -->
    <div style="position: absolute; left: 30px; top: 40px; background-color: rgba(255, 255, 255, 0.65); padding: 15px 25px; border-radius: 4px;">
    <div style="color: #d6336c; font-size: 20px; font-weight: bold; margin-bottom: 5px;">ぽかぽか陽気の穏やかな朝</div>
    <div style="color: #d6336c; font-size: 20px; font-weight: bold;">花畑では、蝶々がのんびり飛んでいます</div>
  </div>

  <!-- ちょうちょ（左） -->
  <img src="butterfly.gif" style="position: absolute; left: 150px; top: 360px; width: 80px; height: 80px; transform: rotate(-15deg);">

  <!-- ちょうちょ（中央） -->
  <img src="butterfly.gif" style="position: absolute; left: 380px; top: 290px; width: 70px; height: 70px; transform: rotate(10deg);">

  <!-- ちょうちょ（右） -->
  <img src="butterfly.gif" style="position: absolute; left: 585px; top: 415px; width: 65px; height: 65px; transform: rotate(-5deg);">
</div>

</body>
</html>
